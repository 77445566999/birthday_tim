<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Birthday Tim</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
}

#camera{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

#tim{
position:fixed;
bottom:0;
left:50%;
transform:translateX(-50%);
height:70vh;
z-index:2;
pointer-events:none;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>

<!-- 这里放你的提姆图片 -->
<img id="tim" src="tim_idle.png">

<script>

async function startCamera(){
const stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:false
});
document.getElementById("camera").srcObject = stream;
}

startCamera();

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();

recognition.lang = "zh-CN";
recognition.continuous = true;

recognition.start();

recognition.onresult = function(event){

let text =
event.results[event.results.length-1][0].transcript;

if(text.includes("生日快乐")){
triggerTim();
}

}

function triggerTim(){

const tim = document.getElementById("tim");

tim.src = "tim_smile.png";

let audio = new Audio("thanks.mp3");
audio.play();

}

</script>

</body>
</html>
