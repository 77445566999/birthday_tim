<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Birthday</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:sans-serif;
}

/* 摄像头 */

#camera{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

/* Tim */

#tim{
position:fixed;
bottom:8%;
left:50%;
transform:translateX(-50%);
width:60vw;
max-width:420px;
pointer-events:none;
}

/* Start按钮 */

#start{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:12px 24px;
font-size:16px;
background:white;
border:none;
border-radius:8px;
z-index:10;
}

/* 测试面板 */

#panel{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:10px 16px;
border-radius:8px;
font-size:14px;
text-align:center;
}

</style>
</head>

<body>

<button id="start">Start</button>

<video id="camera" autoplay playsinline></video>

<img id="tim" src="tim_idle.png">

<audio id="thanks" src="thanks.mp3"></audio>

<div id="panel">
<div id="status">状态：未启动</div>
<div id="text">识别结果：</div>
</div>

<script>

const video = document.getElementById("camera");
const tim = document.getElementById("tim");
const thanks = document.getElementById("thanks");

const startBtn = document.getElementById("start");
const statusText = document.getElementById("status");
const resultText = document.getElementById("text");

let triggered=false;

startBtn.onclick=startApp;

async function startApp(){

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

video.srcObject = stream;

startRecognition();

startBtn.style.display="none";

}catch(e){

alert("需要摄像头和麦克风权限");

}

}

function startRecognition(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("浏览器不支持语音识别");

return;

}

const recognition = new SpeechRecognition();

recognition.lang="zh-CN";
recognition.continuous=true;
recognition.interimResults=true;

recognition.onstart=function(){

statusText.innerText="状态：语音识别已启动";

};

recognition.onresult=function(event){

let text=event.results[event.results.length-1][0].transcript;

resultText.innerText="识别结果："+text;

console.log("识别到:",text);

if(!triggered && text.includes("生日快乐")){

triggered=true;

triggerTim();

}

};

recognition.onerror=function(e){

statusText.innerText="识别错误："+e.error;

console.log(e);

};

recognition.onend=function(){

statusText.innerText="识别重启中";

recognition.start();

};

recognition.start();

}

function triggerTim(){

tim.src="tim_smile.png";

thanks.currentTime=0;

thanks.play();

}

</script>

</body>
</html>
