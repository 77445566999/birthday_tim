<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Birthday - Dual Cam Focus</title>

<style>
  body { margin: 0; overflow: hidden; background: black; font-family: sans-serif; }
  
  /* 主屏幕：后置摄像头 */
  #mainCamera { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
  
  /* 小屏幕：前置摄像头 (左上角) */
  #subCamera { 
    position: fixed; top: 20px; left: 20px; width: 30vw; max-width: 150px; 
    aspect-ratio: 9/16; object-fit: cover; border: 2px solid white; 
    border-radius: 12px; z-index: 10; background: #222; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }

  /* 人物贴图 */
  #tim { position: fixed; bottom: 8%; left: 50%; transform: translateX(-50%); width: 60vw; max-width: 420px; pointer-events: none; transition: transform 0.3s; z-index: 5; }
  
  /* 启动按钮 */
  #start { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 15px 40px; font-size: 20px; font-weight: bold; background: #ff4757; color: white; border: none; border-radius: 50px; z-index: 100; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
  
  /* 进度指示器：左下角纯数字 */
  #status { position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.7); font-size: 24px; font-weight: bold; z-index: 20; display: none; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
</style>
</head>

<body>

<button id="start">开始互动</button>
<div id="status"><span id="count">0</span>/4</div>

<video id="mainCamera" autoplay playsinline></video>
<video id="subCamera" autoplay playsinline muted></video> <img id="tim" src="tim_idle.png">
<audio id="thanks" src="thanks.mp3"></audio>

<script>
const mainVideo = document.getElementById("mainCamera");
const subVideo = document.getElementById("subCamera");
const tim = document.getElementById("tim");
const thanks = document.getElementById("thanks");
const startBtn = document.getElementById("start");
const statusDiv = document.getElementById("status");
const countSpan = document.getElementById("count");

let triggered = false;
let shoutCount = 0; 
let audioContext = null; 

startBtn.onclick = startApp;

async function startApp() {
  try {
    // 1. 请求后置摄像头 (Environment) 用于主屏幕
    const mainStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: "environment" } },
      audio: { echoCancellation: true, noiseSuppression: true }
    }).catch(async () => {
      // 如果环境强制要求后置失败（如PC端），退而求其次选择默认
      return await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    });
    mainVideo.srcObject = mainStream;

    // 2. 请求前置摄像头 (User) 用于左上角小屏幕
    // 注意：部分手机可能不支持同时打开两个物理摄像头，若失败则不显示小窗
    try {
        const subStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "user" }
        });
        subVideo.srcObject = subStream;
    } catch(err) {
        console.warn("无法同时开启前置摄像头:", err);
        subVideo.style.display = "none";
    }

    // 3. 音频处理
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();
    startVolumeDetect(mainStream);

    // 4. UI 调整
    startBtn.style.display = "none"; // 隐藏开始按钮
    statusDiv.style.display = "block"; // 显示左下角数字
    
  } catch(e) {
    alert("启动失败: " + e.message);
  }
}

function startVolumeDetect(stream) {
  const mic = audioContext.createMediaStreamSource(stream);
  const filter = audioContext.createBiquadFilter();
  filter.type = "bandpass"; 
  filter.frequency.value = 1200;
  filter.Q.value = 0.8;

  const analyser = audioContext.createAnalyser();
  analyser.fftSize = 512;

  mic.connect(filter);
  filter.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);
  let isCooldown = false;

  function detect() {
    if (triggered) return;

    analyser.getByteFrequencyData(data);
    let sum = 0;
    for(let i = 0; i < data.length; i++) sum += data[i];
    let averageVolume = sum / data.length;

    if(averageVolume > 45 && !isCooldown) { 
      shoutCount++; 
      countSpan.innerText = shoutCount;

      isCooldown = true;
      tim.style.transform = "translateX(-50%) scale(1.1)";
      
      setTimeout(() => {
        tim.style.transform = "translateX(-50%) scale(1.0)";
        isCooldown = false;
      }, 400); 

      if (shoutCount >= 4) {
        triggered = true; 
        triggerTim();
      }
    }
    requestAnimationFrame(detect);
  }
  detect();
}

function triggerTim(){
  statusDiv.style.display = "none";
  tim.src = "tim_smile.png";
  tim.style.transform = "translateX(-50%) scale(1.2)";
  thanks.play();
}
</script>

</body>
</html>
