<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tim Birthday</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:sans-serif;
}

/* 摄像头画面 */
#camera{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    object-fit:cover;
}

/* Tim 图片 */
#tim{
    position:absolute;
    left:50%;
    bottom:10vh;
    transform:translateX(-50%);
    width:60vw;
    max-width:400px;
    transition:0.5s;
}

/* 按钮 */
#startBtn{
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:18px;
    padding:10px 20px;
}
</style>
</head>

<body>

<!-- 摄像头 -->
<video id="camera" autoplay playsinline></video>

<!-- Tim -->
<img id="tim" src="tim_idle.png">

<button id="startBtn" onclick="startAll()">开始</button>

<script>

/* 打开摄像头 */
async function startCamera(){

    try{

        const stream = await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:true
        });

        document.getElementById("camera").srcObject = stream;

    }catch(e){
        alert("摄像头或麦克风权限被拒绝");
    }

}


/* 语音识别 */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

let recognition = new SpeechRecognition();

recognition.lang="zh-CN";
recognition.continuous=true;
recognition.interimResults=false;


/* 开始按钮 */
function startAll(){

    startCamera();

    recognition.start();

    document.getElementById("startBtn").style.display="none";

}


/* 识别结果 */
recognition.onresult=function(event){

    let text = event.results[event.results.length-1][0].transcript;

    console.log("识别到："+text);

    if(text.includes("生日") && text.includes("快乐")){

        let tim=document.getElementById("tim");

        tim.src="tim_smile.png";

        tim.style.transform="translateX(-50%) scale(1.1)";

        new Audio("thanks.mp3").play();

    }

};


/* 出错自动重启 */
recognition.onerror=function(){

    recognition.start();

};

</script>

</body>
</html>
