<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Birthday</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

#camera{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

#tim{
  position:fixed;
  bottom:8%;
  left:50%;
  transform:translateX(-50%);
  width:60vw;
  max-width:420px;
  pointer-events:none;
}

#start{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 24px;
  font-size:16px;
  background:white;
  border:none;
  border-radius:8px;
  z-index:10;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="start">Start</button>

<video id="camera" autoplay playsinline></video>
<img id="tim" src="tim_idle.png">
<audio id="thanks" src="thanks.mp3"></audio>

<script>
const video = document.getElementById("camera");
const tim = document.getElementById("tim");
const thanks = document.getElementById("thanks");
const startBtn = document.getElementById("start");

let triggered = false;
let loudStart = null;
let audioContext = null; 

// 修正1: 把初始化逻辑移到点击事件里，确保权限弹窗能弹出
startBtn.onclick = startApp;

async function startApp() {
  try {
    console.log("开始按钮被点击");
    
    // 1. 请求权限
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });
    video.srcObject = stream;

    // 2. 创建音频上下文 (必须在用户点击后)
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume(); // 恢复运行
    console.log('音频上下文已启动');

    // 3. 开始检测
    startVolumeDetect(stream);

    // 4. 隐藏按钮
    startBtn.style.display = "none";
    
  } catch(e) {
    console.error("启动失败:", e);
    alert("启动失败，请检查麦克风/摄像头权限，或是否在微信内置浏览器中打开。\n\n详细错误: " + e.message);
  }
}

function startVolumeDetect(stream) {
  const mic = audioContext.createMediaStreamSource(stream);
  const analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;
  mic.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function detect() {
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for(let i = 0; i < data.length; i++){
      let v = (data[i] - 128) / 128;
      sum += v * v;
    }
    let volume = Math.sqrt(sum / data.length);
    let vol100 = volume * 100; 

    // 修正2: 修复了注释符号的问题，现在这行是有效的调试代码
    // 请在手机浏览器的“调试模式”下查看具体数值，或者暂时取消注释看弹窗
    // alert("音量: " + vol100.toFixed(2)); 

    if(vol100 > 5){
      if(!loudStart){
        loudStart = Date.now();
      }
      if(!triggered && Date.now() - loudStart > 2000){
        triggered = true;
        triggerTim();
      }
    } else {
      loudStart = null;
    }

    requestAnimationFrame(detect);
  }

  detect();
}

function triggerTim(){
  console.log("触发成功！");
  tim.src = "tim_smile.png";
  thanks.play().catch(e => console.log("音频播放失败:", e));
}
</script>

</body>
</html>
