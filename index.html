<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Birthday</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
color:white;
}

/* 摄像头 */

#camera{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

/* Tim透卡 */

#tim{
position:fixed;
bottom:8%;
left:50%;
transform:translateX(-50%);
width:60vw;
max-width:420px;
pointer-events:none;
transition:all .4s ease;
}

/* 漂浮动画 */

@keyframes float{
0%{transform:translate(-50%,0)}
50%{transform:translate(-50%,-12px)}
100%{transform:translate(-50%,0)}
}

.float{
animation:float 3s ease-in-out infinite;
}

/* 按钮 */

#start{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:10;
padding:12px 24px;
font-size:16px;
background:white;
border:none;
border-radius:8px;
}

/* 字幕 */

#subtitle{
position:fixed;
bottom:28%;
left:50%;
transform:translateX(-50%);
font-size:20px;
background:rgba(0,0,0,0.6);
padding:8px 16px;
border-radius:10px;
}

</style>
</head>

<body>

<button id="start">Start</button>

<video id="camera" autoplay playsinline></video>

<img id="tim" src="tim_idle.png" class="float">

<audio id="thanks" src="thanks.mp3"></audio>

<div id="subtitle">等待语音…</div>

<script>

const video=document.getElementById("camera");
const tim=document.getElementById("tim");
const thanks=document.getElementById("thanks");
const startBtn=document.getElementById("start");
const subtitle=document.getElementById("subtitle");

let triggered=false;

startBtn.onclick=startApp;

async function startApp(){

try{

const stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"},
audio:true
});

video.srcObject=stream;

startRecognition();

startBtn.style.display="none";

}catch(e){

alert("请允许摄像头和麦克风权限");

}

}

function startRecognition(){

const SpeechRecognition=
window.SpeechRecognition||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("浏览器不支持语音识别，请使用Chrome");

return;

}

const recognition=new SpeechRecognition();

recognition.lang="zh-CN";
recognition.continuous=true;
recognition.interimResults=true;

recognition.onstart=function(){
console.log("语音识别启动");
subtitle.innerText="正在听…";
};

recognition.onresult=function(event){

let text="";

for(let i=event.resultIndex;i<event.results.length;i++){
text+=event.results[i][0].transcript;
}

subtitle.innerText=text;

console.log("识别到:",text);

/* 关键词触发 */

if(!triggered && text.match(/生日|happy|birthday/i)){

triggered=true;

triggerTim();

}

};

recognition.onerror=function(e){

console.log("识别错误:",e);

};

recognition.onend=function(){

if(!triggered){
recognition.start();
}

};

recognition.start();

}

/* Tim反应 */

function triggerTim(){

subtitle.innerText="生日快乐！";

tim.src="tim_smile.png";

thanks.play();

}

</script>

</body>
</html>
