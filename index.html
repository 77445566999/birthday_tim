<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Birthday</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

/* 摄像头画面 */

#camera{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

/* Tim透卡 */

#tim{
position:fixed;
bottom:8%;
left:50%;
transform:translateX(-50%);
width:60vw;
max-width:420px;
pointer-events:none;
}

/* 启动按钮 */

#start{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
z-index:10;
padding:12px 22px;
font-size:16px;
background:white;
border:none;
border-radius:8px;
}

</style>
</head>

<body>

<button id="start">Start</button>

<video id="camera" autoplay playsinline></video>

<img id="tim" src="tim_idle.png">

<audio id="thanks" src="thanks.mp3"></audio>

<script>

const video = document.getElementById("camera");
const tim = document.getElementById("tim");
const thanks = document.getElementById("thanks");
const startBtn = document.getElementById("start");

startBtn.onclick = startApp;

async function startApp(){

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:{ facingMode:"environment" },
audio:true
});

video.srcObject = stream;

startRecognition();

startBtn.style.display="none";

}catch(e){

alert("Camera permission denied");

}

}

function startRecognition(){

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Browser does not support speech recognition");
return;
}

const recognition = new SpeechRecognition();

recognition.lang = "zh-CN";
recognition.continuous = true;

recognition.onresult = function(event){

const text =
event.results[event.resultIndex][0].transcript;

console.log(text);

/* 触发关键词 */

if(
text.includes("生日快乐") ||
text.includes("提姆生日快乐") ||
text.includes("happy birthday")
){

triggerTim();

}

};

recognition.start();

}

/* 触发换图和语音 */

function triggerTim(){

tim.src="tim_smile.png";

thanks.play();

}

</script>

</body>
</html>
