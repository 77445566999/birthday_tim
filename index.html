<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Tim</title>
</head>
<body>
    <h1>Welcome to Birthday Tim!</h1>

    <script>
        // Initialize variables for audio and video streams
        let audioStream;
        let videoStream;

        // Function to separate video and audio streams properly
        function initializeMedia() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: true })
                .then(stream => {
                    videoStream = stream.getVideoTracks()[0];
                    audioStream = stream.getAudioTracks()[0];
                    console.log('Audio and Video streams initialized.');
                })
                .catch(err => {
                    console.error('Error accessing media devices.', err);
                });
        }

        // Function to handle speech recognition
        function startRecognition() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.continuous = true;
            recognition.interimResults = false;

            recognition.onstart = () => {
                console.log('Speech recognition service has started.');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[event.resultIndex][0].transcript;
                if (transcript === '生日快乐') {
                    console.log('Correct phrase detected: 生日快乐');
                    // Execute your birthday celebration function here
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error detected: ', event.error);
                // Implement better error handling
            };

            recognition.onend = () => {
                console.log('Speech recognition service has stopped. Restarting...');
                startRecognition(); // Restart logic for continuous recognition
            };

            recognition.start();
        }

        // Initialize media and start recognition on page load
        window.onload = () => {
            initializeMedia();
            startRecognition();
        };
    </script>
</body>
</html>
