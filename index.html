<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Birthday</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}

#camera{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

#tim{
  position:fixed;
  bottom:8%;
  left:50%;
  transform:translateX(-50%);
  width:60vw;
  max-width:420px;
  pointer-events:none;
}

#start{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 24px;
  font-size:16px;
  background:white;
  border:none;
  border-radius:8px;
  z-index:10;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="start">Start</button>

<video id="camera" autoplay playsinline></video>
<img id="tim" src="tim_idle.png">
<audio id="thanks" src="thanks.mp3"></audio>

<script>
const video = document.getElementById("camera");
const tim = document.getElementById("tim");
const thanks = document.getElementById("thanks");
const startBtn = document.getElementById("start");

let triggered = false;
let loudStart = null;
// 声明全局变量以存储 AudioContext
let audioContext = null; 

async function startApp() {
  try {
    // 1. 请求摄像头和麦克风权限
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });
    video.srcObject = stream;

    // 2. 【核心修复】在用户点击事件中创建 AudioContext
    // 这样做是为了满足浏览器的“自动播放策略”
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    // 确保上下文处于运行状态
    if (audioContext.state === 'suspended') {
      await audioContext.resume();
    }
    console.log('🎤 音频上下文已启动，状态:', audioContext.state);

    // 3. 开始检测音量
    startVolumeDetect(stream);

    // 4. 隐藏开始按钮
    startBtn.style.display = "none";
    
  } catch(e) {
    console.error("无法启动媒体设备:", e);
    alert("请允许摄像头和麦克风权限\n" + e.message);
  }
}

function startVolumeDetect(stream) {
  // 使用传入的全局 audioContext
  const mic = audioContext.createMediaStreamSource(stream);
  const analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;
  mic.connect(analyser);

  const data = new Uint8Array(analyser.fftSize);

  function detect() {
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for(let i = 0; i < data.length; i++){
      let v = (data[i] - 128) / 128;
      sum += v * v;
    }
    let volume = Math.sqrt(sum / data.length);
    // 将音量放大便于观察
    let vol100 = volume * 100; 

    // --- 🛠️ 调试用：取消下面的注释可以看具体数值 ---
    // 说话时看控制台数字是否跳动，普通环境音可能在 1-5，大喊可能在 10-20+
    console.log("🔊 实时音量:", vol100.toFixed(2));

    // 阈值检测 (原为10，现改为5，更容易触发)
    if(vol100 > 5){
      if(!loudStart){
        loudStart = Date.now();
      }
      if(!triggered && Date.now() - loudStart > 2000){ // 持续2秒
        triggered = true;
        triggerTim();
      }
    } else {
      // 音量不够大，重置计时器
      loudStart = null;
    }

    requestAnimationFrame(detect);
  }

  detect();
}

function triggerTim(){
  console.log("🎉 触发成功！切换图片并播放音频");
  tim.src = "tim_smile.png";
  thanks.currentTime = 0;
  thanks.play().catch(e => console.error("音频播放失败:", e));
}
</script>

</body>
</html>
