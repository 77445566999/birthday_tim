<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Birthday</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
color:white;
font-family:sans-serif;
}

#camera{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

#tim{
position:fixed;
bottom:8%;
left:50%;
transform:translateX(-50%);
width:60vw;
max-width:420px;
pointer-events:none;
}

#start{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:12px 24px;
font-size:16px;
background:white;
border:none;
border-radius:8px;
z-index:10;
}

#panel{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:10px 16px;
border-radius:8px;
font-size:14px;
text-align:center;
}

</style>
</head>

<body>

<button id="start">Start</button>

<video id="camera" autoplay playsinline></video>

<img id="tim" src="tim_idle.png">

<audio id="thanks" src="thanks.mp3"></audio>

<div id="panel">
<div id="status">status: not started</div>
<div id="text">result:</div>
</div>

<script>

const video=document.getElementById("camera");
const tim=document.getElementById("tim");
const thanks=document.getElementById("thanks");

const startBtn=document.getElementById("start");
const statusText=document.getElementById("status");
const resultText=document.getElementById("text");

let triggered=false;

startBtn.onclick=startApp;

async function startApp(){

try{

const stream=await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

video.srcObject=stream;

startRecognition();

startBtn.style.display="none";

}catch(e){

alert("camera and microphone permission required");

}

}

function startRecognition(){

const SpeechRecognition=
window.SpeechRecognition||
window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("speech recognition not supported");

return;

}

const recognition=new SpeechRecognition();

recognition.lang="en-US";
recognition.continuous=true;
recognition.interimResults=true;

recognition.onstart=function(){

statusText.innerText="status: listening";

};

recognition.onresult=function(event){

let text=event.results[event.results.length-1][0].transcript;

resultText.innerText="result: "+text;

console.log("recognized:",text);

if(!triggered && text.toLowerCase().includes("happy birthday")){

triggered=true;

triggerTim();

}

};

recognition.onerror=function(e){

statusText.innerText="error: "+e.error;

};

recognition.onend=function(){

statusText.innerText="restarting";

recognition.start();

};

recognition.start();

}

function triggerTim(){

tim.src="tim_smile.png";

thanks.currentTime=0;

thanks.play();

}

</script>

</body>
</html>
