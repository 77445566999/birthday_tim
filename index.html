<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Birthday</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  position: relative;
}

#camera{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

#tim{
  position:fixed;
  bottom:8%;
  left:50%;
  transform:translateX(-50%);
  width:60vw;
  max-width:420px;
  pointer-events:none;
}

#start{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 24px;
  font-size:16px;
  background:white;
  border:none;
  border-radius:8px;
  z-index:10;
  cursor: pointer;
}

/* 调试信息样式 */
#debug {
  position: fixed;
  top: 20px;
  left: 20px;
  color: white;
  font-family: monospace;
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 5px;
  z-index: 999;
}
</style>
</head>

<body>

<button id="start">Start</button>

<video id="camera" autoplay playsinline></video>
<img id="tim" src="tim_idle.png">
<audio id="thanks" src="thanks.mp3"></audio>

<!-- 屏幕上的调试信息 -->
<div id="debug">检测次数: <span id="count">0</span> / 4</div>

<script>
const video = document.getElementById("camera");
const tim = document.getElementById("tim");
const thanks = document.getElementById("thanks");
const startBtn = document.getElementById("start");
const countSpan = document.getElementById("count");

let triggered = false;
let shoutCount = 0; 
let audioContext = null; 

startBtn.onclick = startApp;

async function startApp() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });
    video.srcObject = stream;

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();

    startVolumeDetect(stream);

    startBtn.style.display = "none";
    
  } catch(e) {
    alert("启动失败: " + e.message);
  }
}

function startVolumeDetect(stream) {
  const mic = audioContext.createMediaStreamSource(stream);
  const analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;
  mic.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);
  
  let isCooldown = false; // 冷却状态标志

  function detect() {
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for(let i = 0; i < data.length; i++){
      let v = (data[i] - 128) / 128;
      sum += v * v;
    }
    let volume = Math.sqrt(sum / data.length);
    let vol100 = volume * 100; 

    // --- 核心逻辑：带冷却的触发 ---
    if(vol100 > 10 && !triggered) { 
      
      // 只有不在冷却期，才计数
      if (!isCooldown) {
        shoutCount++; 
        countSpan.textContent = shoutCount; 
        console.log("检测到第", shoutCount, "次声音");

        // 进入冷却期
        isCooldown = true;
        
        // 1秒后解除冷却（防止一次长音算多次）
        setTimeout(() => {
          isCooldown = false;
        }, 1000); 
      }
    }

    // --- 检查是否达到4次 ---
    if (shoutCount >= 4 && !triggered) {
      triggered = true; 
      triggerTim();
    }

    requestAnimationFrame(detect);
  }

  detect();
}

function triggerTim(){
  console.log("🎉 触发成功！");
  tim.src = "tim_smile.png";
  thanks.currentTime = 0;
  thanks.play();
}
</script>

</body>
</html>
