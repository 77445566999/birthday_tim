<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Birthday</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  position: relative;
}

#camera{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

#tim{
  position:fixed;
  bottom:8%;
  left:50%;
  transform:translateX(-50%);
  width:60vw;
  max-width:420px;
  pointer-events:none;
}

#start{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 24px;
  font-size:16px;
  background:white;
  border:none;
  border-radius:8px;
  z-index:10;
  cursor: pointer;
}

/* 新增：调试信息的样式 */
#debug {
  position: fixed;
  top: 20px;
  left: 20px;
  color: white;
  font-family: monospace;
  font-size: 14px;
  background: rgba(0,0,0,0.5);
  padding: 10px;
  border-radius: 5px;
  z-index: 999;
}
#volume-bar {
  width: 100px;
  height: 20px;
  background: #333;
  border: 1px solid #555;
  margin-top: 5px;
  overflow: hidden;
}
#volume-fill {
  height: 100%;
  width: 0%;
  background: red;
  transition: width 0.1s;
}
</style>
</head>

<body>

<button id="start">Start</button>

<video id="camera" autoplay playsinline></video>
<img id="tim" src="tim_idle.png">

<!-- 新增：调试显示区域 -->
<div id="debug">
  实时音量: <span id="volume-text">0</span>
  <div id="volume-bar"><div id="volume-fill"></div></div>
</div>

<audio id="thanks" src="thanks.mp3"></audio>

<script>
const video = document.getElementById("camera");
const tim = document.getElementById("tim");
const thanks = document.getElementById("thanks");
const startBtn = document.getElementById("start");
// 获取调试元素
const volumeText = document.getElementById("volume-text");
const volumeFill = document.getElementById("volume-fill");

let triggered = false;
let loudStart = null;
let audioContext = null; 

startBtn.onclick = startApp;

async function startApp() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });
    video.srcObject = stream;

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();

    startVolumeDetect(stream);

    startBtn.style.display = "none";
    
  } catch(e) {
    console.error("启动失败:", e);
    alert("启动失败: " + e.message);
  }
}

function startVolumeDetect(stream) {
  const mic = audioContext.createMediaStreamSource(stream);
  const analyser = audioContext.createAnalyser();
  analyser.fftSize = 2048;
  mic.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  function detect() {
    analyser.getByteTimeDomainData(data);
    let sum = 0;
    for(let i = 0; i < data.length; i++){
      let v = (data[i] - 128) / 128;
      sum += v * v;
    }
    let volume = Math.sqrt(sum / data.length);
    // 计算出 0-100 的数值
    let vol100 = volume * 100; 

    // --- 核心改动：实时显示音量 ---
    volumeText.textContent = vol100.toFixed(2);
    // 限制最大宽度为 100%
    volumeFill.style.width = Math.min(vol100, 100) + '%';

    // --- 核心改动：把阈值降到 1，并且只要超过就立刻触发，不再等 2 秒 ---
    // 如果 vol100 大于 1 (非常容易达到)，且还没触发过
    if(vol100 > 1){
      if(!triggered){
        triggered = true;
        triggerTim();
      }
    }

    requestAnimationFrame(detect);
  }

  detect();
}

function triggerTim(){
  console.log("🎉 触发函数执行了");
  // --- 核心改动：加一个 alert，确认是不是图片路径的问题 ---
  // 如果弹出这个，说明逻辑走通了，只是图片没加载出来
  alert("触发成功！正在尝试切换图片");

  tim.src = "tim_smile.png";
  thanks.currentTime = 0;
  thanks.play().catch(e => console.log("音频播放失败:", e));
}
</script>

</body>
</html>
