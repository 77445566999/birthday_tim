<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tim Birthday</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
}

/* 摄像头 */

#camera{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
}

/* Tim透卡 */

#tim{
position:fixed;
bottom:8%;
left:50%;
transform:translateX(-50%);
width:60vw;
max-width:420px;
pointer-events:none;
}

/* Start按钮 */

#start{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
padding:12px 24px;
font-size:16px;
background:white;
border:none;
border-radius:8px;
z-index:10;
}

</style>
</head>

<body>

<button id="start">Start</button>

<video id="camera" autoplay playsinline></video>

<img id="tim" src="tim_idle.png">

<audio id="thanks" src="thanks.mp3"></audio>

<script>

const video = document.getElementById("camera");
const tim = document.getElementById("tim");
const thanks = document.getElementById("thanks");
const startBtn = document.getElementById("start");

let triggered = false;
let loudStart = null;

startBtn.onclick = startApp;

async function startApp(){

try{

const stream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
});

video.srcObject = stream;

startVoiceDetect(stream);

startBtn.style.display="none";

}catch(e){

alert("需要摄像头和麦克风权限");

}

}

function startVoiceDetect(stream){

const audioContext = new AudioContext();

const mic = audioContext.createMediaStreamSource(stream);

const analyser = audioContext.createAnalyser();

analyser.fftSize = 2048;

mic.connect(analyser);

const data = new Uint8Array(analyser.fftSize);

function detect(){

analyser.getByteTimeDomainData(data);

let sum = 0;

for(let i=0;i<data.length;i++){

let v = (data[i] - 128) / 128;

sum += v*v;

}

let volume = Math.sqrt(sum / data.length);

/* 振幅判断 */

if(volume > 0.03){

if(!loudStart){
loudStart = Date.now();
}

/* 连续3秒 */

if(!triggered && Date.now() - loudStart > 3000){

triggered = true;

triggerTim();

}

}else{

loudStart = null;

}

requestAnimationFrame(detect);

}

detect();

}

function triggerTim(){

tim.src = "tim_smile.png";

thanks.currentTime = 0;

thanks.play();

}

</script>

</body>
</html>
